<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media Crawler</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-800">
    <main class="mx-auto max-w-6xl px-4 py-8">
      <div class="mb-6 rounded-xl bg-white p-6 shadow-sm">
        <h1 class="text-2xl font-bold">Download media từ URL</h1>
        <p class="mt-1 text-sm text-slate-500">Nhập URL để lấy ảnh, video, âm thanh và PDF.</p>

        <form id="crawlForm" class="mt-4 flex flex-col gap-3 sm:flex-row">
          <input
            id="urlInput"
            type="text"
            placeholder="https://example.com"
            class="w-full rounded-lg border border-slate-300 px-4 py-2 outline-none focus:border-blue-500"
            required
          />
          <button
            id="crawlBtn"
            type="submit"
            class="rounded-lg bg-blue-600 px-4 py-2 font-medium text-white hover:bg-blue-700 disabled:cursor-not-allowed disabled:bg-blue-300"
          >
            Search
          </button>
        </form>

        <p id="status" class="mt-3 text-sm"></p>
      </div>

      <div id="resultRoot" class="space-y-6"></div>

      <footer class="mt-8 rounded-xl bg-gradient-to-r from-slate-50 to-slate-100 p-6 shadow-sm border border-slate-200">
        <div class="flex flex-col items-center justify-center gap-4 text-center">
          <p class="text-sm text-slate-600">
            Made by <span class="font-semibold text-slate-800">Steve</span> 
            <span class="text-red-500 animate-pulse">❤️</span>
          </p>
          <div class="flex flex-wrap justify-center gap-3">
            <a
              href="https://facebook.com/huuhieu2001"
              target="_blank"
              rel="noreferrer"
              class="inline-flex items-center gap-1 rounded-md border border-slate-300 px-3 py-2 text-sm font-medium text-slate-700 hover:bg-white hover:border-blue-400 transition-colors"
            >
              <span>f</span> Facebook
            </a>
            <a
              href="https://github.com/huuhieu17"
              target="_blank"
              rel="noreferrer"
              class="inline-flex items-center gap-1 rounded-md border border-slate-300 px-3 py-2 text-sm font-medium text-slate-700 hover:bg-white hover:border-gray-800 transition-colors"
            >
              <span>⚙</span> GitHub
            </a>
          </div>
        </div>
      </footer>
    </main>

    <script>
      const form = document.getElementById("crawlForm");
      const input = document.getElementById("urlInput");
      const statusEl = document.getElementById("status");
      const resultRoot = document.getElementById("resultRoot");
      const crawlBtn = document.getElementById("crawlBtn");
      let currentSourceUrl = "";

      function escapeHtml(text) {
        return String(text)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function makeDownloadUrl(url) {
        const refererPart = currentSourceUrl ? `&referer=${encodeURIComponent(currentSourceUrl)}` : "";
        return `/api/download?url=${encodeURIComponent(url)}${refererPart}`;
      }

      function getFileTypeLabel(item, type) {
        if (type === "image") return "IMG";
        if (type === "video") return "VIDEO";
        if (type === "audio") return "AUDIO";
        if (type === "pdf") return "PDF";

        const lowerUrl = String(item?.url || "").toLowerCase();
        if (/\.(doc|docx)(\?|#|$)/i.test(lowerUrl)) return "DOCX";
        if (/\.(xls|xlsx|xslx)(\?|#|$)/i.test(lowerUrl)) return "XLSX";
        return "FILE";
      }

      function renderCard(item, type) {
        let preview = "";

        if (type === "image") {
          preview = `<img src="${item.url}" alt="${escapeHtml(item.filename)}" class="h-40 w-full rounded-md object-cover bg-slate-200" loading="lazy" />`;
        } else if (type === "video") {
          preview = `<video src="${item.url}" class="h-40 w-full rounded-md bg-black" controls preload="metadata"></video>`;
        } else if (type === "audio") {
          preview = `<div class="rounded-md bg-slate-100 p-3"><audio src="${item.url}" class="w-full" controls preload="none"></audio></div>`;
        } else if (type === "pdf") {
          preview = `<iframe src="${item.url}" class="h-40 w-full rounded-md bg-slate-200" title="PDF preview"></iframe>`;
        } else if (type === "office") {
          preview = `<div class="flex h-40 w-full items-center justify-center rounded-md bg-slate-100 text-center text-sm font-medium text-slate-600">Tài liệu Office<br/>DOCX / XLSX</div>`;
        }

        return `
          <article class="relative rounded-lg border border-slate-200 bg-white p-3 shadow-sm">
            <span class="absolute right-3 top-3 rounded bg-slate-900/80 px-2 py-0.5 text-xs font-semibold text-white">${getFileTypeLabel(item, type)}</span>
            ${preview}
            <p class="mt-3 truncate text-sm text-slate-600" title="${escapeHtml(item.url)}">${escapeHtml(item.filename || "file")}</p>
            <div class="mt-3 flex items-center gap-2">
              <a href="${item.url}" target="_blank" rel="noreferrer" class="rounded-md border border-slate-300 px-3 py-1.5 text-sm hover:bg-slate-50">Mở nguồn</a>
              <a href="${makeDownloadUrl(item.url)}" class="rounded-md bg-emerald-600 px-3 py-1.5 text-sm text-white hover:bg-emerald-700">Download</a>
            </div>
          </article>
        `;
      }

      function renderSection(title, type, items) {
        if (!items.length) {
          return `
            <details class="group rounded-xl bg-white shadow-sm">
              <summary class="flex cursor-pointer list-none items-center justify-between px-4 py-3">
                <h2 class="text-lg font-semibold">${title} (0)</h2>
                <span class="text-slate-500 transition-transform group-open:rotate-180">⌄</span>
              </summary>
              <div class="border-t border-slate-100 px-4 py-3">
                <p class="text-sm text-slate-500">Không có dữ liệu.</p>
              </div>
            </details>
          `;
        }

        const cards = items.map((item) => renderCard(item, type)).join("");

        return `
          <details class="group rounded-xl bg-white shadow-sm">
            <summary class="flex cursor-pointer list-none items-center justify-between px-4 py-3">
              <h2 class="text-lg font-semibold">${title} (${items.length})</h2>
              <span class="text-slate-500 transition-transform group-open:rotate-180">⌄</span>
            </summary>
            <div class="border-t border-slate-100 p-4">
              <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
                ${cards}
              </div>
            </div>
          </details>
        `;
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const url = input.value.trim();
        if (!url) return;

        statusEl.textContent = "Đang cào dữ liệu...";
        statusEl.className = "mt-3 text-sm text-blue-600";
        resultRoot.innerHTML = "";
        crawlBtn.disabled = true;

        try {
          const response = await fetch("/api/crawl", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ url }),
          });

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error || "Lỗi không xác định");
          }

          statusEl.textContent = `Hoàn tất: ${data.sourceUrl}`;
          statusEl.className = "mt-3 text-sm text-emerald-600";
          currentSourceUrl = data.sourceUrl || "";

          const officeItems = data.office || [];
          const docxItems = officeItems.filter((item) => /\.(doc|docx)(\?|#|$)/i.test(item.url));
          const xlsxItems = officeItems.filter((item) => /\.(xls|xlsx|xslx)(\?|#|$)/i.test(item.url));

          resultRoot.innerHTML = [
            renderSection("Ảnh", "image", data.image || []),
            renderSection("Video", "video", data.video || []),
            renderSection("Âm thanh", "audio", data.audio || []),
            renderSection("PDF", "pdf", data.pdf || []),
            renderSection("DOCX", "office", docxItems),
            renderSection("XLSX", "office", xlsxItems),
          ].join("");
        } catch (error) {
          statusEl.textContent = `Lỗi: ${error.message}`;
          statusEl.className = "mt-3 text-sm text-rose-600";
        } finally {
          crawlBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
